<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Smart Warehouse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script th:src="@{/js/app-settings.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card" aria-label="Login form">
        <div class="auth-brand">
            <span class="material-symbols-outlined brand-icon">widgets</span>
            <div>
                <div class="brand-title">Warehouse Engine</div>
                <div class="brand-subtitle">Role-based demo login</div>
            </div>
        </div>

        <div class="alert alert-danger py-2" th:if="${param.error}">
            Invalid username or password
        </div>
        <div class="alert alert-success py-2" th:if="${param.logout}">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div>
                <label class="form-label fw-semibold" for="username">Username</label>
                <input class="form-control form-control-lg" id="username" name="username" type="text" autocomplete="username" required autofocus>
            </div>
            <div>
                <label class="form-label fw-semibold" for="password">Password</label>
                <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary btn-lg w-100 d-inline-flex align-items-center justify-content-center gap-2" type="submit">
                <span class="material-symbols-outlined">login</span>
                Login
            </button>
        </form>

        <div class="demo-users staff-demo-card" aria-label="Staff demo user">
            <div class="metric-label mb-2">Public Staff mobile demo</div>
            <div class="demo-user-row">
                <span class="status-badge status-default">STAFF</span>
                <span class="code-text">Nova001 / nova001</span>
            </div>
            <p class="small text-secondary mb-0 mt-2" th:text="${demoNotice}">
                Public demo shows Staff credentials only.
            </p>
        </div>
    </section>
</main>
</body>
</html>
