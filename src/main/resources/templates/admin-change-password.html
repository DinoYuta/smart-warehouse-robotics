<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script th:src="@{/js/app-settings.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar('admin-users')}"></aside>

    <div class="workspace">
        <header class="top-bar">
            <div class="fw-bold text-primary">Admin Workflow</div>
            <div th:replace="~{fragments/topbar-controls :: topbarControls}"></div>
        </header>

        <main class="page-canvas">
            <section class="d-flex flex-column flex-xl-row justify-content-between gap-3 mb-4">
                <div>
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="status-badge status-default" data-i18n="admin">Admin</span>
                        <span class="status-badge status-moving" data-i18n="changePassword">Change Password</span>
                    </div>
                    <h1 class="h2 fw-bold mb-1" data-i18n="changePassword">Change Password</h1>
                    <p class="text-secondary mb-0">Update the selected account password.</p>
                </div>
                <div class="d-flex align-items-start">
                    <a class="btn btn-outline-secondary d-flex align-items-center gap-2" th:href="@{/admin/users}">
                        <span class="material-symbols-outlined">arrow_back</span>
                        <span data-i18n="userManagement">User Management</span>
                    </a>
                </div>
            </section>

            <div class="alert alert-danger" th:if="${validationErrors != null and !#lists.isEmpty(validationErrors)}">
                <div class="fw-semibold mb-2">Please fix the password details.</div>
                <ul class="mb-0">
                    <li th:each="error : ${validationErrors}" th:text="${error}">Validation error</li>
                </ul>
            </div>

            <section class="row g-4">
                <div class="col-12 col-xl-6">
                    <div class="stitch-card">
                        <div class="card-title-row">
                            <span class="material-symbols-outlined">key</span>
                            <h2 class="h5 fw-semibold mb-0" data-i18n="changePassword">Change Password</h2>
                        </div>

                        <form class="p-4"
                              th:action="@{/admin/users/{id}/change-password(id=${user.id})}"
                              th:object="${changePasswordForm}"
                              method="post">
                            <div class="metric-card p-3 mb-3">
                                <div class="metric-label">Username</div>
                                <div class="fw-semibold" th:text="${user.username}">Nova001</div>
                                <div class="metric-label mt-2" data-i18n="role">Role</div>
                                <span class="status-badge status-default" th:text="${user.role}" th:data-i18n-text="${user.role}">STAFF</span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold" for="newPassword" data-i18n="newPassword">New Password</label>
                                <input class="form-control"
                                       id="newPassword"
                                       type="password"
                                       th:field="*{newPassword}"
                                       minlength="8"
                                       maxlength="100"
                                       required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold" for="confirmPassword" data-i18n="confirmPassword">Confirm Password</label>
                                <input class="form-control"
                                       id="confirmPassword"
                                       type="password"
                                       th:field="*{confirmPassword}"
                                       minlength="8"
                                       maxlength="100"
                                       required>
                            </div>

                            <div class="d-flex flex-column flex-sm-row gap-2">
                                <button class="btn btn-primary d-flex align-items-center justify-content-center gap-2" type="submit">
                                    <span class="material-symbols-outlined">save</span>
                                    <span data-i18n-text="Save">Save</span>
                                </button>
                                <a class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2" th:href="@{/admin/users}">
                                    <span class="material-symbols-outlined">close</span>
                                    <span data-i18n-text="Cancel">Cancel</span>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/app-notifications.js}" defer></script>
</body>
</html>
