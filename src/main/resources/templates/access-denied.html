<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied | Smart Warehouse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script th:src="@{/js/app-settings.js}"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card text-center" aria-label="Access denied">
        <span class="material-symbols-outlined auth-denied-icon">lock</span>
        <h1 class="h3 fw-bold mb-2">Access denied</h1>
        <p class="text-secondary mb-4">Your current role cannot open this page.</p>
        <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
            <a class="btn btn-primary d-inline-flex align-items-center justify-content-center gap-2" th:href="@{/staff/pickup-request}">
                <span class="material-symbols-outlined">home</span>
                Staff Home
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-secondary d-inline-flex align-items-center justify-content-center gap-2 w-100" type="submit">
                    <span class="material-symbols-outlined">logout</span>
                    Logout
                </button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
